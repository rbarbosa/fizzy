name: Sync fork with upstream

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily — runs before your morning task
  workflow_dispatch:       # lets you trigger manually from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh repo sync ${{ github.repository }} \
            --source basecamp/fizzy \
            --branch main
